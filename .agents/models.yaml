# .agents/models.yaml — Centralized Model Configuration
#
# This file is a HUMAN-EDITABLE SOURCE OF TRUTH for model assignments.
# It is NOT read by OpenCode automatically — you must propagate changes
# to each agent's .md file frontmatter `model:` field.
#
# Convention: model strings follow OpenCode format (provider/model)
# Update this file first when changing models, THEN update each agent's
# .md frontmatter to match.
#
# ── Model Aliases ─────────────────────────────────────

models:
  fast:     deepseek/deepseek-v4-flash        # Budget-tier, 13B active params
  capable:  deepseek/deepseek-v4-flash        # Standard tier
  premium:  deepseek/deepseek-v4-pro           # Premium-tier, 49B active params
  local:    lmstudio/qwen3.5-9b               # Local inference only
  budget:   deepseek/deepseek-v4-flash         # Alias for fast
  opencode-free: opencode/deepseek-v4-flash-free  # FREE tier via OpenCode

# ── Agent → Model Assignments ────────────────────────

agents:
  primary:
    ingenium-planner:            premium    # deepseek/deepseek-v4-pro
    ingenium-orchestrator:       capable    # deepseek/deepseek-v4-flash

  execution:
    ingenium-software-engineer:             capable   # deepseek/deepseek-v4-flash
    ingenium-software-engineer-fast:        fast      # deepseek/deepseek-v4-flash
    ingenium-software-engineer-premium:     premium   # deepseek/deepseek-v4-pro
    ingenium-docs:                          opencode-free # opencode/deepseek-v4-flash-free
    ingenium-qa:                            opencode-free # opencode/deepseek-v4-flash-free
    ingenium-plan-file:                     fast      # deepseek/deepseek-v4-flash

  research:
    ingenium-explore:             opencode-free # opencode/deepseek-v4-flash-free
    ingenium-scout:               opencode-free # opencode/deepseek-v4-flash-free
    ingenium-security-auditor:    fast      # deepseek/deepseek-v4-flash
    ingenium-prompt-engineer:     premium   # deepseek/deepseek-v4-pro

# ── Reasoning Effort Overrides ───────────────────────

reasoning:
  ingenium-planner:                        xhigh
  ingenium-orchestrator:                   xhigh
  ingenium-software-engineer-fast:         medium
  ingenium-software-engineer-premium:      xhigh
  ingenium-explore:                        high
  ingenium-security-auditor:               high
