# .agents/models.yaml — Centralized Model Configuration
#
# This file is a HUMAN-EDITABLE SOURCE OF TRUTH for model assignments.
# It is NOT read by OpenCode automatically — you must propagate changes
# to each agent's .md file frontmatter `model:` field.
#
# Convention: model strings follow OpenCode format (provider/model)
# Update this file first when changing models, THEN update each agent's
# .md frontmatter to match.
#
# ── Model Aliases ─────────────────────────────────────

models:
  fast:     deepseek/deepseek-v4-flash        # Budget-tier, 13B active params
  capable:  deepseek/deepseek-v4-flash        # Standard tier
  premium:  deepseek/deepseek-v4-pro           # Premium-tier, 49B active params
  local:    lmstudio/qwen3.5-9b               # Local inference only
  budget:   deepseek/deepseek-v4-flash         # Alias for fast

# ── Agent → Model Assignments ────────────────────────

agents:
  primary:
    ingenium-planner:            premium    # Planning needs deep reasoning
    ingenium-orchestrator:     capable    # Coordination needs speed

  execution:
    ingenium-software-engineer:             capable   # Default implementation
    ingenium-software-engineer-fast:        fast      # Budget tier
    ingenium-software-engineer-premium:     premium   # Premium tier

  research:
    ingenium-explore:             fast      # Code search — wide, not deep
    ingenium-scout:               capable   # Web/Thread — moderate reasoning
    ingenium-security-auditor:    capable   # Security — thorough analysis

  review:
    ingenium-qa:                  capable   # Code review + tests
    ingenium-docs:                fast      # Documentation — mechanical
    ingenium-plan-file:           fast      # Plan file CRUD — mechanical

# ── Reasoning Effort Overrides ───────────────────────

reasoning:
  ingenium-planner:                        xhigh
  ingenium-orchestrator:                 high
  ingenium-software-engineer:            high
  ingenium-software-engineer-fast:       medium
  ingenium-software-engineer-premium:    xhigh
  ingenium-explore:                      medium
  ingenium-scout:                        high
  ingenium-qa:                           high
  ingenium-docs:                         medium
  ingenium-plan-file:                    low
