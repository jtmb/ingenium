services:
  ingenium:
    build: .
    ports:
      - "3000:3000"   # Dashboard
      - "4096:4096"   # OpenCode server (auth)
      - "4097:4097"   # API
      - "4098:4098"   # OpenCode iframe (no auth)
    environment:
      - OPENCODE_SERVER_PASSWORD=test
      - INGENIUM_CORE_DB_PATH=/app/.ingenium/data
      - INGENIUM_GLOBAL_CONFIG_PATH=/home/appuser/.config/opencode
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - MS_OAUTH_CLIENT_ID=${MS_OAUTH_CLIENT_ID:-}
      - MS_OAUTH_CLIENT_SECRET=${MS_OAUTH_CLIENT_SECRET:-}
      - INGENIUM_EMAIL_ENCRYPTION_KEY=${INGENIUM_EMAIL_ENCRYPTION_KEY:-c3c13abc6afd70efcad425fc501b07677ec3bfe5777a97393b76c876bfc3f278}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:3000/mail/oauth/callback}
    security_opt: ["seccomp=unconfined"]
    volumes:
      - ingenium-data:/app/.ingenium
      - opencode-config:/home/appuser/.config
      - opencode-data:/home/appuser/.local
      - ./opencode.json:/app/opencode.json:ro
      - ${HOME:-~}/repos:/workspace
      - ${HOME:-~}/.local/share/opencode:/var/opencode:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4097/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ingenium-data:
  opencode-config:
  opencode-data:
