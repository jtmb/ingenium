services:
  ingenium:
    build:
      context: .
      args:
        UID: ${UID:-1000}
    ports:
      - "3000:3000"   # Dashboard
      - "4096:4096"   # OpenCode server (auth)
      - "4097:4097"   # API
      - "4098:4098"   # OpenCode iframe (no auth)
    environment:
      - OPENCODE_SERVER_PASSWORD=test
      - WORKSPACE_DIR=/workspace
    volumes:
      - ingenium-data:/app/.ingenium
      - ./opencode.json:/app/opencode.json:ro
      - ${HOME:-~}/repos:/workspace
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4097/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ingenium-data:
