services:
  ingenium:
    build: .
    ports:
      - "3000:3000"   # Dashboard
      - "4096:4096"   # OpenCode server
      - "4097:4097"   # API
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?OpenCode server password required}
    volumes:
      - ingenium-data:/app/.ingenium
      - ./opencode.json:/app/opencode.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4097/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ingenium-data:
